version: '3.8'

services:
  poker:
    build: .
    container_name: poker-online
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000

  nginx:
    image: nginx:alpine
    container_name: poker-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      # 如需 HTTPS，取消下方注释并放入证书文件
      # - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - poker
